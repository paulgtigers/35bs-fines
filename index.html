  <style>

      * { margin:0; padding:0; box-sizing:border-box; }

      .fine-table { width:100%; border-collapse:collapse; }
      .fine-table th { font-size:9px; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-dim); padding:6px 10px; border-bottom:1px solid var(--border); text-align:left; font-weight:500; }
      .fine-table th:last-child { text-align:right; }

      .fine-type-row { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.04); }
      .fine-type-row:last-child { border-bottom:none; }
      .fine-type-bar-wrap { flex:1; height:6px; background:var(--surface3); border-radius:3px; overflow:hidden; }
      .fine-type-bar { height:100%; background:var(--gold); border-radius:3px; transition:width 0.6s ease; }
      .fine-type-name { font-size:12px; color:var(--text); min-width:0; flex:2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
      .fine-type-count { font-family:'DM Mono',monospace; font-size:12px; color:var(--text-dim); width:30px; text-align:right; flex-shrink:0; }
      .fine-type-amt { font-family:'DM Mono',monospace; font-size:12px; color:var(--gold); width:55px; text-align:right; flex-shrink:0; }
      .loading { text-align:center; padding:40px; color:var(--text-dim); font-size:13px; letter-spacing:1px; }

      @keyframes spin { to { transform:rotate(360deg); } }

      .empty-state { text-align:center; padding:24px; color:var(--text-dim); font-size:13px; }
      .tab-bar { display:flex; gap:4px; margin-bottom:16px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:4px; }

      .tab-btn.active { background:var(--gold); color:var(--black); }
      .tab-panel { display:none; }
